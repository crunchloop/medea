syntax = "proto3";

// Package medea.v1 is the single source of type truth for Medea: the API
// speaks these messages, the bbolt store persists them verbatim (proto wire
// bytes), and the CLI consumes them. See design/datastore.md §4.
package medea.v1;

import "google/protobuf/duration.proto";

option go_package = "github.com/crunchloop/medea/gen/medea/v1;medeav1";

// Role of a node / node pool.
enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_CONTROLPLANE = 1;
  ROLE_WORKER = 2;
}

// ClusterMode governs how rollouts are triggered (design/rollout-safety.md §2).
enum ClusterMode {
  CLUSTER_MODE_UNSPECIFIED = 0; // treated as MANUAL
  CLUSTER_MODE_MANUAL = 1;      // rollouts only via explicit Rollout jobs (v1)
  CLUSTER_MODE_AUTO = 2;        // drift-reconcile; deferred, rejected in v1
}

// ---------------------------------------------------------------------------
// Cluster — cluster-wide desired + observed state. One per managed cluster.
// ---------------------------------------------------------------------------
message Cluster {
  string name = 1;
  ClusterDesired desired = 2;    // precious; persisted
  ClusterObserved observed = 3;  // cache; in-memory only (datastore.md §2)
  ClusterEndpoints endpoints = 4;
  uint64 revision = 5;           // last-write revision (datastore.md §4)
  ClusterMode mode = 6;          // rollout trigger mode; default (unspecified) = manual
  bool rollouts_enabled = 7;     // hard guard (rollout-safety.md §3); default off, never set by seed
  bool provisioning_enabled = 8; // hard guard (provisioning-plane.md §4); default off, never set by seed
}

message ClusterDesired {
  string talos_version = 1;
  string kubernetes_version = 2;
}

message ClusterObserved {
  string kubernetes_version = 1;
  bool control_plane_ready = 2;
}

message ClusterEndpoints {
  repeated string talos = 1;  // Talos API endpoints (node IPs)
  string kube = 2;            // kube-apiserver endpoint host:port
}

// ---------------------------------------------------------------------------
// NodePool — a group of like nodes (the managed-node-group abstraction).
// ---------------------------------------------------------------------------
message NodePool {
  string cluster = 1;
  string name = 2;
  Role role = 3;
  repeated string members = 4;       // node identities (addresses); v1 = existing nodes
  NodePoolDesired desired = 5;       // precious; persisted
  RolloutStrategy strategy = 6;
  bool paused = 7;
  uint64 revision = 8;
  // Provisioning (v2, design/provisioning-plane.md §2). replicas == 0 + a
  // non-empty members list = v1 "manage these exact addresses" behavior; a pool
  // opts into provisioning by setting replicas + selector, and members becomes
  // reconciler-managed.
  uint32 replicas = 9;
  map<string, string> selector = 10;  // matched against Host.labels
  repeated string extensions = 11;    // Image Factory system extensions for the pool (empty = stock schematic)
}

message NodePoolDesired {
  string talos_version = 1;  // "" = inherit Cluster.desired.talos_version
}

// ---------------------------------------------------------------------------
// Host — a piece of bare metal Medea knows about *before* it is a cluster
// member: the provisioning-plane inventory (design/provisioning-plane.md §2).
// Cluster Inventory aggregate; identity = NIC MAC (Matchbox keys on it).
// v2-M1 only registers Hosts (state REGISTERED); the provisioning reconciler
// (v2-M3) drives the rest of the lifecycle.
// ---------------------------------------------------------------------------
message Host {
  string cluster = 1;
  string mac = 2;                  // identity within a cluster
  string pool = 3;                 // owning pool once allocated
  map<string, string> labels = 4;  // matched by NodePool.selector
  string addr = 5;                 // observed Talos endpoint once it joins
  Role role = 6;
  HostState state = 7;
  string message = 8;
  uint64 revision = 9;
  string provisioning_started_at = 10; // RFC3339, stamped when state -> PROVISIONING (for the join timeout)
}

enum HostState {
  HOST_STATE_UNSPECIFIED = 0;
  HOST_STATE_REGISTERED = 1;     // known; not yet allocated to a pool
  HOST_STATE_ALLOCATED = 2;      // bound to a pool to satisfy replicas
  HOST_STATE_PROVISIONING = 3;   // staged in Matchbox; awaiting PXE boot + join
  HOST_STATE_READY = 4;          // joined + healthy; a Machine is bound
  HOST_STATE_FAILED = 5;         // provision did not converge (halt)
  HOST_STATE_DEPROVISIONING = 6; // releasing / replacing
}

message RolloutStrategy {
  uint32 max_unavailable = 1;                    // OS path; default 1
  google.protobuf.Duration drain_timeout = 2;
  bool halt_on_failure = 3;
  bool snapshot_before_control_plane = 4;        // mandatory default for controlplane
}

// ---------------------------------------------------------------------------
// Machine — one physical/virtual node.
// ---------------------------------------------------------------------------
message Machine {
  string cluster = 1;
  string pool = 2;
  string talos_endpoint = 3;     // identity within a cluster
  Role role = 4;
  MachineObserved observed = 5;  // cache; in-memory only
  uint64 revision = 6;
}

message MachineObserved {
  MachinePhase phase = 1;
  string talos_version = 2;
  string kubernetes_version = 3;
  bool healthy = 4;
}

enum MachinePhase {
  MACHINE_PHASE_UNSPECIFIED = 0;
  MACHINE_PHASE_PROVISIONING = 1;
  MACHINE_PHASE_BOOTING = 2;
  MACHINE_PHASE_JOINING = 3;
  MACHINE_PHASE_READY = 4;
  MACHINE_PHASE_DRAINING = 5;
  MACHINE_PHASE_RESETTING = 6;
  MACHINE_PHASE_NOT_READY = 7;
}

// ---------------------------------------------------------------------------
// Rollout progress — precious *during* a rollout; persisted for resume
// (datastore.md §2, §7; rollout-controller.md §4, §5).
// ---------------------------------------------------------------------------
message MachineRollout {
  string cluster = 1;
  string addr = 2;
  RolloutState state = 3;
  string target_talos_version = 4;
  string message = 5;
  uint64 revision = 6;
}

enum RolloutState {
  ROLLOUT_STATE_UNSPECIFIED = 0;
  ROLLOUT_STATE_IDLE = 1;
  ROLLOUT_STATE_DRAINING = 2;
  ROLLOUT_STATE_UPGRADING = 3;
  ROLLOUT_STATE_WAITING_HEALTHY = 4;
  ROLLOUT_STATE_DONE = 5;
  ROLLOUT_STATE_FAILED = 6;
}

message ClusterRollout {
  string cluster = 1;
  ClusterRolloutPhase phase = 2;
  string target_kubernetes_version = 3;
  string message = 4;
  uint64 revision = 5;
}

enum ClusterRolloutPhase {
  CLUSTER_ROLLOUT_PHASE_UNSPECIFIED = 0;
  CLUSTER_ROLLOUT_PHASE_IDLE = 1;
  CLUSTER_ROLLOUT_PHASE_UPGRADING = 2;
  CLUSTER_ROLLOUT_PHASE_FAILED = 3;
}

// ---------------------------------------------------------------------------
// Rollout — the explicit job that authorizes and tracks an upgrade
// (design/rollout-safety.md §5). Rollouts run only from a job, never from
// desired↔observed drift (in manual mode). Persisted (precious during a run).
// ---------------------------------------------------------------------------
enum RolloutKind {
  ROLLOUT_KIND_UNSPECIFIED = 0;
  ROLLOUT_KIND_TALOS = 1;
  ROLLOUT_KIND_KUBERNETES = 2;
}

enum RolloutJobState {
  ROLLOUT_JOB_STATE_UNSPECIFIED = 0;
  ROLLOUT_JOB_STATE_PENDING = 1;
  ROLLOUT_JOB_STATE_RUNNING = 2;
  ROLLOUT_JOB_STATE_PAUSED = 3;
  ROLLOUT_JOB_STATE_FAILED = 4;
  ROLLOUT_JOB_STATE_DONE = 5;
  ROLLOUT_JOB_STATE_CANCELLED = 6;
}

message Rollout {
  string cluster = 1;
  string pool = 2;                  // talos path; empty + KUBERNETES = cluster-wide (M3)
  RolloutKind kind = 3;
  string target_version = 4;
  RolloutJobState state = 5;
  string created_by = 6;
  string created_at = 7;            // RFC3339, stamped at the API boundary
  repeated string planned_targets = 8; // machines captured at plan time
  string message = 9;
  uint64 revision = 10;
}
