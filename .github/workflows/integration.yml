# Integration tests against a real (docker-provisioned) Talos cluster. These boot
# actual clusters — minutes, not milliseconds — so they run nightly and on-demand
# rather than per-PR. The fast unit gate lives in ci.yml.
#
# QEMU tests (make test-qemu) are NOT run here: they need Apple-Silicon + vmnet
# and belong on a self-hosted runner, triggered manually.
name: integration

on:
  schedule:
    # ~07:00 UTC nightly (off-hours).
    - cron: "0 7 * * *"
  workflow_dispatch: {}

# CGO is required: the 1Password Go SDK is imported unconditionally, and the race
# detector needs it too.
env:
  CGO_ENABLED: "1"
  # Pin talosctl to the imported Talos module version (go.mod: v1.13.5) so the
  # provisioner matches the client the code compiles against.
  TALOS_VERSION: "v1.13.5"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    # A generous ceiling: real cluster boots dominate. The suite itself targets
    # far less, but leave headroom for image pulls on a cold runner.
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install talosctl
        run: |
          curl -sSL "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64" \
            -o /usr/local/bin/talosctl
          chmod +x /usr/local/bin/talosctl
          talosctl version --client

      - name: Integration tests
        run: make test-integration
