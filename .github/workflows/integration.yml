# Integration tests against real (docker-provisioned) Talos clusters. These boot
# actual clusters — minutes each — so they run nightly and on-demand, not per-PR.
# The fast unit gate lives in ci.yml.
#
# Each top-level test runs as its OWN job (matrix) so it boots at most ONE Talos
# docker cluster: a single boot fits an ubuntu-latest runner, whereas the full
# suite run serially does not. TestClusterSuite runs the three read-only checks
# as parallel subtests against its one cluster; TestMatchboxServesStagedHost
# boots no cluster (fast).
#
# QEMU end-to-end (test/e2e, make test-qemu) is a separate workflow (e2e.yml) on
# a KVM runner.
name: integration

on:
  schedule:
    # ~07:00 UTC nightly (off-hours).
    - cron: "0 7 * * *"
  workflow_dispatch: {}

# CGO is required: the 1Password Go SDK is imported unconditionally, and the race
# detector needs it too.
env:
  CGO_ENABLED: "1"
  # Pin talosctl to the imported Talos module version (go.mod: v1.13.5) so the
  # provisioner matches the client the code compiles against.
  TALOS_VERSION: "v1.13.5"

permissions:
  contents: read

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    strategy:
      # Report every test's result independently — one slow/flaky boot must not
      # cancel the others.
      fail-fast: false
      matrix:
        test:
          - TestClusterSuite
          - TestDrainEvictsWorkload
          - TestK8sUpgrade
          - TestMatchboxServesStagedHost
    runs-on: ubuntu-latest
    # One boot fits comfortably; the harness caps a create at 20m, so 35m leaves
    # headroom for image pull + health + the test itself on a cold runner.
    timeout-minutes: 35
    name: ${{ matrix.test }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install talosctl
        run: |
          curl -sSL "https://github.com/siderolabs/talos/releases/download/${TALOS_VERSION}/talosctl-linux-amd64" \
            -o /usr/local/bin/talosctl
          chmod +x /usr/local/bin/talosctl
          talosctl version --client

      - name: Run ${{ matrix.test }}
        # Anchor the -run regex to the exact top-level test name.
        run: go test -tags integration -run "^${{ matrix.test }}$" -timeout 30m -v ./test/integration/
