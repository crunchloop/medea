# Build and publish the Medea container image to GHCR.
#
# Pushes to `main` publish `:main` + `:sha-<short>`; version tags (`v1.2.3`)
# publish `:1.2.3`, `:1.2`, and `:latest`. Consumers (home-cluster's Podman
# Quadlet) pin a tag from ghcr.io/crunchloop/medea.
name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  # Allow a manual publish from any ref.
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          # `latest` only on version tags, never on branch pushes.
          flavor: |
            latest=auto

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
