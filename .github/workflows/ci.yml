# Continuous integration: the fast `make check` (vet + lint + test) on every PR
# and push to main. No external deps — integration/qemu suites (docker/talosctl,
# QEMU) run out-of-band, not here.
name: ci

on:
  push:
    branches: [main]
  pull_request:

# CGO is required: the 1Password Go SDK is imported unconditionally, and the
# race detector needs it too.
env:
  CGO_ENABLED: "1"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
