# golangci-lint v2 config. Run: `make lint` (or golangci-lint run ./...).
version: "2"

linters:
  # Default set (errcheck, govet, staticcheck, ineffassign, unused) plus misspell.
  enable:
    - misspell
  exclusions:
    # Keep golangci-lint's standard exclusions (e.g. don't flag unchecked
    # fmt.Fprintf / log output) rather than replacing them.
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      # Test cleanup routinely ignores Close()/Serve() errors — that's fine.
      - path: _test\.go
        linters:
          - errcheck
